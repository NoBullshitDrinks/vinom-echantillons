<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>VINOM · Échantillons GDD2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--blue:#1F4E79;--blue2:#2E75B6;--ink:#1c2530;--muted:#6b7683;--bg:#eef1f5;--card:#fff;--line:#dde3ea;
 --ok:#2e7d54;--warn:#b45309;--rouge:#7b2d3b;--blanc:#b8912a;--rose:#cf7ba0;--bulles:#7d8a5a;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:30;background:var(--blue);color:#fff;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.brand b{font-size:16px;letter-spacing:.5px}.brand small{opacity:.85;font-size:12px}
.wrap{max-width:900px;margin:0 auto;padding:12px 14px 120px}
.setup{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px 2px;font-weight:600}
.field select,.field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--ink)}
.field select:focus,.field input:focus,.search input:focus{outline:2px solid var(--blue2);outline-offset:1px}
.needsel{border-color:var(--warn);background:#fff8ef}
.search{position:relative;margin-bottom:8px}
.search input{width:100%;padding:12px 12px 12px 38px;border:1px solid var(--line);border-radius:10px;font-size:15px}
.search svg{position:absolute;left:11px;top:12px;opacity:.5}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 13px;font-size:13px;cursor:pointer;user-select:none}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.rowbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.rowbar select{flex:1;min-width:150px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff}
.btn{border:0;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer}
.btn-ghost{background:#fff;border:1px solid var(--blue);color:var(--blue)}
.btn-blue{background:var(--blue);color:#fff}
.region{margin:18px 0 4px}
.region>h2{margin:0 0 8px;font-size:16px;color:#fff;background:var(--blue);border-radius:10px;padding:9px 13px;display:flex;justify-content:space-between;align-items:center}
.region>h2 span{font-size:12px;font-weight:600;opacity:.85}
.dom{margin:10px 0 4px}
.dom>h3{margin:0 0 6px;font-size:12.5px;color:var(--blue);letter-spacing:.3px;border-bottom:1.5px solid var(--blue2);padding-bottom:4px;display:flex;justify-content:space-between}
.dom>h3 span{color:var(--muted);font-weight:600}
.ref{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:7px}
.ref.has{border-color:var(--blue2);box-shadow:0 0 0 2px rgba(46,117,182,.12)}
.ref .info{flex:1;min-width:0}
.ref .des{font-weight:600;font-size:14.5px;line-height:1.25}
.ref .sub{font-size:12px;color:var(--muted);margin-top:2px}
.ref .code{font-size:11px;color:#9aa4b0;font-variant-numeric:tabular-nums}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.d-Rouge{background:var(--rouge)}.d-Blanc{background:var(--blanc)}.d-Rosé{background:var(--rose)}.d-Bulles{background:var(--bulles)}.d-Spiritueux{background:#8a6d3b}.d-{background:#bbb}
.step{display:flex;flex:none}
.step button{width:38px;height:38px;border:1px solid var(--line);background:#fff;font-size:20px;line-height:1;cursor:pointer;color:var(--blue)}
.step button:first-child{border-radius:10px 0 0 10px}.step button:last-child{border-radius:0 10px 10px 0}
.step input{width:46px;height:38px;text-align:center;border:1px solid var(--line);border-left:0;border-right:0;font-size:16px;font-weight:600;-moz-appearance:textfield}
.step input::-webkit-outer-spin-button,.step input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.step.act input{color:var(--blue);background:#f2f7fc}
.empty{text-align:center;color:var(--muted);padding:40px 10px}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);box-shadow:0 -3px 12px rgba(0,0,0,.08);padding:10px 14px}
.bottom .inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.tot{font-size:13px;color:var(--muted)}.tot b{font-size:20px;color:var(--ink);display:block;line-height:1}
.btn-validate{background:var(--blue);color:#fff;border:0;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer}
.btn-validate:disabled{background:#aab4c0;cursor:not-allowed}
.ht{background:#fff8ef;border:1px solid #f2d9b4;border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.ht .des{font-weight:600;font-size:14px}.ht small{color:var(--warn)}
dialog{border:0;border-radius:16px;padding:0;max-width:440px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
dialog::backdrop{background:rgba(20,30,45,.45)}
.dlg{padding:20px}.dlg h2{margin:0 0 4px;font-size:18px;color:var(--blue)}.dlg p{margin:6px 0;font-size:14px;color:var(--muted)}
.dlg .field{margin:10px 0}.dlg .row{display:flex;gap:8px;margin-top:14px}
.ok-ico{width:52px;height:52px;border-radius:50%;background:#e7f4ec;color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px}
.spin{width:44px;height:44px;border:4px solid #dbe4ee;border-top-color:var(--blue);border-radius:50%;margin:6px auto;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header><div class="brand"><div><b>VINOM · Échantillons GDD2</b><br><small>Relevé mensuel des échantillons prélevés</small></div></div></header>
<div class="wrap">
  <div class="setup">
    <div class="field"><label for="agent">Agent</label><select id="agent"><option value="">— Choisir —</option></select></div>
    <div class="field"><label for="mois">Mois du relevé</label><input type="month" id="mois"></div>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="q" placeholder="Rechercher un vin, un domaine, une référence…">
  </div>
  <div class="chips" id="chips">
    <div class="chip on" data-c="">Toutes</div><div class="chip" data-c="Rouge">Rouges</div>
    <div class="chip" data-c="Blanc">Blancs</div><div class="chip" data-c="Rosé">Rosés</div><div class="chip" data-c="Bulles">Bulles</div>
  </div>
  <div class="rowbar">
    <select id="regionfilter"><option value="">Toutes les régions</option></select>
    <select id="fourfilter"><option value="">Tous les domaines</option></select>
  </div>
  <div class="rowbar">
    <button class="btn btn-ghost" id="addht">+ Référence hors tarif</button>
    <button class="btn btn-ghost" id="reset">Vider le relevé</button>
  </div>
  <div id="htlist"></div>
  <div id="list"></div>
</div>
<div class="bottom"><div class="inner">
  <div class="tot"><b id="totbt">0</b> bouteille(s) · <span id="totref">0</span> référence(s)</div>
  <button class="btn-validate" id="validate" disabled>Valider les échantillons</button>
</div></div>

<dialog id="dlgHT"><div class="dlg">
  <h2>Référence hors tarif</h2><p>Pour un vin prélevé mais absent du tarif imprimé.</p>
  <div class="field"><label>Désignation du vin *</label><input id="ht_des" placeholder="Ex. : Château X 2022"></div>
  <div class="field"><label>Domaine / fournisseur (si connu)</label><input id="ht_four" placeholder="Ex. : Domaine Y"></div>
  <div class="field"><label>Quantité *</label><input id="ht_qte" type="number" min="1" value="1"></div>
  <div class="row"><button class="btn btn-ghost" id="ht_cancel" style="flex:1">Annuler</button><button class="btn btn-blue" id="ht_add" style="flex:1">Ajouter</button></div>
</div></dialog>
<dialog id="dlgSend"><div class="dlg" style="text-align:center"><div class="spin"></div><p id="send_msg">Envoi du relevé…</p></div></dialog>
<dialog id="dlgOK"><div class="dlg" style="text-align:center">
  <div class="ok-ico">✓</div><h2 id="ok_title">Relevé envoyé</h2><p id="ok_msg"></p>
  <div class="row" style="flex-direction:column" id="ok_actions"></div>
</div></dialog>

const AGENTS = [{"code": "ADA", "nom": "AURELIEN DAMELINCOURT"}, {"code": "MON", "nom": "Alexandre MONTCEL"}, {"code": "BBV", "nom": "Benoit BRUMENT"}, {"code": "CAI", "nom": "CAILLE Jérôme"}, {"code": "DAM", "nom": "DAMELINCOURT (Ludovic)"}, {"code": "DUA", "nom": "DURAND ALEXIS"}, {"code": "DUB", "nom": "DURAND BENOIT"}, {"code": "COL", "nom": "David COLLIOT"}, {"code": "GUE", "nom": "GUILLAUME BOUTTIER-GUESNON"}, {"code": "GAT", "nom": "Grégory GATÉ"}, {"code": "JYR", "nom": "JEAN YVES ROMAIN"}, {"code": "CDV", "nom": "Jean-Baptiste Precetti"}, {"code": "LEL", "nom": "LELLA Michele"}, {"code": "JOU", "nom": "Lionel JOUBERT GAILLARD"}, {"code": "MOR", "nom": "MOREAU Stéphane"}, {"code": "MOU", "nom": "MOUTON (Olivier)"}, {"code": "ALL", "nom": "Marie-Laure ALLARD"}, {"code": "GAI", "nom": "Pierre GAILLAC"}, {"code": "REN", "nom": "RENAULD Joseph"}, {"code": "KER", "nom": "Ronan KERVENNAL"}, {"code": "TAF", "nom": "TAFFOREAU (Olivier)"}, {"code": "SOU", "nom": "Thomas SOUBIRAN"}];
const REGION_ORDER = ["Île-de-France", "Jura", "Alsace", "Bordeaux", "Beaujolais", "Bourgogne", "Rhône", "Loire", "Provence-Corse", "Occitanie", "Reste du Monde", "Bulles", "Spiritueux"];
const BUILD = "2026-07-22";
const CONFIG = {
  // Vide = mode autonome (l'agent télécharge le fichier et l'envoie).
  // URL du Worker Cloudflare = mode centralisé : le relevé part au serveur,
  // Yasmina reçoit automatiquement le fichier consolidé de tous les agents en fin de mois.
  WEBHOOK_URL: "https://echantillons-worker.lecoindalex.workers.dev/submit",
  YASMINA_EMAIL: "adv@vinom.fr"
};
const CENTRAL = !!CONFIG.WEBHOOK_URL;

const $=s=>document.querySelector(s);
let qty={}, horsTarif=[], colFilter="";

const agentSel=$("#agent");
AGENTS.forEach(a=>{const o=document.createElement("option");o.value=a.code;o.textContent=a.nom+" ("+a.code+")";agentSel.appendChild(o);});
const regSel=$("#regionfilter");
REGION_ORDER.filter(r=>REFERENCES.some(x=>x.reg===r)).forEach(r=>{const o=document.createElement("option");o.value=r;o.textContent=r;regSel.appendChild(o);});
const fourSel=$("#fourfilter");
[...new Set(REFERENCES.map(r=>r.dom).filter(Boolean))].sort().forEach(f=>{const o=document.createElement("option");o.value=f;o.textContent=f;fourSel.appendChild(o);});
$("#mois").value=new Date().toISOString().slice(0,7);

function draftKey(){return "vinom_ech_"+(agentSel.value||"?")+"_"+$("#mois").value;}
function saveDraft(){try{localStorage.setItem(draftKey(),JSON.stringify({qty,horsTarif}));}catch(e){}}
function loadDraft(){try{const d=JSON.parse(localStorage.getItem(draftKey())||"{}");qty=d.qty||{};horsTarif=d.horsTarif||[];}catch(e){qty={};horsTarif=[];}}

function matches(r){
  if(colFilter&&r.coul!==colFilter)return false;
  if(regSel.value&&r.reg!==regSel.value)return false;
  if(fourSel.value&&r.dom!==fourSel.value)return false;
  const q=$("#q").value.trim().toLowerCase();
  if(q){const hay=(r.des+" "+r.dom+" "+r.app+" "+r.four+" "+r.code+" "+r.reg).toLowerCase();if(!hay.includes(q))return false;}
  return true;
}
function render(){
  const htl=$("#htlist");htl.innerHTML="";
  horsTarif.forEach((h,i)=>{
    const d=document.createElement("div");d.className="ht";
    d.innerHTML=`<div><div class="des">${esc(h.des)}</div><small>Hors tarif${h.four?" · "+esc(h.four):""} · ${h.qte} bt</small></div>`;
    const b=document.createElement("button");b.className="btn btn-ghost";b.textContent="Retirer";
    b.onclick=()=>{horsTarif.splice(i,1);saveDraft();render();updateTot();};
    d.appendChild(b);htl.appendChild(d);
  });
  const list=$("#list");list.innerHTML="";
  const shown=REFERENCES.filter(matches);
  if(!shown.length){list.innerHTML=`<div class="empty">Aucune référence ne correspond.<br>Élargissez la recherche ou ajoutez une référence hors tarif.</div>`;return;}
  // groupe région -> domaine
  const byReg={};
  shown.forEach(r=>{(byReg[r.reg] ||= {}); (byReg[r.reg][r.dom||"—"] ||= []).push(r);});
  REGION_ORDER.filter(r=>byReg[r]).forEach(reg=>{
    const secR=document.createElement("div");secR.className="region";
    const nb=Object.values(byReg[reg]).reduce((s,a)=>s+a.length,0);
    const took=Object.values(byReg[reg]).flat().reduce((s,r)=>s+(qty[r.key]||0),0);
    secR.innerHTML=`<h2>${esc(reg)} <span>${nb} réf.${took?" · "+took+" bt":""}</span></h2>`;
    Object.keys(byReg[reg]).sort().forEach(f=>{
      const dg=document.createElement("div");dg.className="dom";
      const t2=byReg[reg][f].reduce((s,r)=>s+(qty[r.key]||0),0);
      dg.innerHTML=`<h3>${esc(f)} <span>${byReg[reg][f].length} réf.${t2?" · "+t2+" bt":""}</span></h3>`;
      byReg[reg][f].forEach(r=>dg.appendChild(refRow(r)));
      secR.appendChild(dg);
    });
    list.appendChild(secR);
  });
}
function refRow(r){
  const n=qty[r.key]||0;
  const el=document.createElement("div");el.className="ref"+(n?" has":"");
  el.innerHTML=`<div class="info"><div class="des"><span class="dot d-${r.coul}"></span>${esc(r.des)}</div>
    <div class="sub">${esc(r.app||"")}${r.fmt?" · <b>"+esc(r.fmt)+"</b>":""}</div><div class="code">${esc(r.code)}</div></div>`;
  const st=document.createElement("div");st.className="step"+(n?" act":"");
  const minus=mk("button","−"),inp=document.createElement("input"),plus=mk("button","+");
  inp.type="number";inp.min="0";inp.value=n;inp.inputMode="numeric";
  minus.onclick=()=>setQ(r.key,(qty[r.key]||0)-1);
  plus.onclick=()=>setQ(r.key,(qty[r.key]||0)+1);
  inp.onchange=()=>setQ(r.key,parseInt(inp.value||"0",10));
  st.append(minus,inp,plus);el.appendChild(st);return el;
}
function mk(t,x){const e=document.createElement(t);e.textContent=x;return e;}
function esc(s){return(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function setQ(code,v){v=Math.max(0,v|0);if(v)qty[code]=v;else delete qty[code];saveDraft();render();updateTot();}
function totals(){const bt=Object.values(qty).reduce((a,b)=>a+b,0)+horsTarif.reduce((a,h)=>a+h.qte,0);return{bt,refs:Object.keys(qty).length+horsTarif.length};}
function updateTot(){const{bt,refs}=totals();$("#totbt").textContent=bt;$("#totref").textContent=refs;$("#validate").disabled=!(bt>0&&agentSel.value);}

$("#q").oninput=render;regSel.onchange=render;fourSel.onchange=render;
$("#chips").onclick=e=>{const c=e.target.closest(".chip");if(!c)return;document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");colFilter=c.dataset.c;render();};
agentSel.onchange=()=>{loadDraft();render();updateTot();agentSel.classList.remove("needsel");};
$("#mois").onchange=()=>{loadDraft();render();updateTot();};
$("#reset").onclick=()=>{if(confirm("Vider tout le relevé en cours ?")){qty={};horsTarif=[];saveDraft();render();updateTot();}};
const dlgHT=$("#dlgHT");
$("#addht").onclick=()=>{$("#ht_des").value="";$("#ht_four").value="";$("#ht_qte").value=1;dlgHT.showModal();};
$("#ht_cancel").onclick=()=>dlgHT.close();
$("#ht_add").onclick=()=>{const des=$("#ht_des").value.trim();const qv=parseInt($("#ht_qte").value||"0",10);
  if(!des||qv<1){alert("Indiquez au moins la désignation et une quantité.");return;}
  horsTarif.push({des,four:$("#ht_four").value.trim(),qte:qv});dlgHT.close();saveDraft();render();updateTot();};

function buildLines(agent,mois){
  const lines=[];
  REFERENCES.forEach(r=>{const n=qty[r.key];if(n)lines.push({mois,agent:agent.code,agentNom:agent.nom,region:r.reg,nf:r.nf,four:r.four,code:r.code,
    article:(r.des+" – "+(r.app||"")+" – "+r.coul+(r.fmt?" "+r.fmt:" 75 cl")).replace(/ –  –/g," –"),coul:r.coul,qte:n,horsTarif:false});});
  horsTarif.forEach(h=>lines.push({mois,agent:agent.code,agentNom:agent.nom,region:"",nf:"",four:h.four||"(hors tarif)",code:"",article:h.des,coul:"",qte:h.qte,horsTarif:true}));
  lines.sort((a,b)=>(a.four||"zzz").localeCompare(b.four||"zzz")||a.article.localeCompare(b.article));
  return lines;
}
$("#validate").onclick=async ()=>{
  if(!agentSel.value){agentSel.classList.add("needsel");agentSel.focus();return;}
  const agent=AGENTS.find(a=>a.code===agentSel.value),mois=$("#mois").value;
  const lines=buildLines(agent,mois);
  if(CENTRAL){
    $("#dlgSend").showModal();
    let okSent=false;
    try{
      const res=await fetch(CONFIG.WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mois,agent:agent.code,agentNom:agent.nom,date:new Date().toISOString(),lines})});
      okSent=res.ok;
    }catch(e){okSent=false;}
    $("#dlgSend").close();
    if(okSent){ clearDraft(); showSent(agent,mois); return; }
    // repli si le serveur ne répond pas : on télécharge pour ne rien perdre
    download(lines,"Echantillons_"+agent.code+"_"+mois+".xlsx");
    showFallback(agent,mois); return;
  }
  const fname="Echantillons_"+agent.code+"_"+mois+".xlsx";
  download(lines,fname); clearDraft(); showAutonome(agent,mois,fname);
};
function clearDraft(){try{localStorage.removeItem(draftKey());}catch(e){}}
function download(lines,fname){
  const rows=lines.map(l=>({"Mois":l.mois,"Agent":l.agent,"Région":l.region,"N° Fourn.":l.nf,"Domaine / Fournisseur":l.four,
    "Référence":l.code,"Article":l.article,"Couleur":l.coul,"Qté prélevée":l.qte}));
  if(window.XLSX){const ws=XLSX.utils.json_to_sheet(rows);ws["!cols"]=[{wch:8},{wch:7},{wch:20},{wch:9},{wch:30},{wch:12},{wch:50},{wch:9},{wch:12}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Échantillons");XLSX.writeFile(wb,fname);}
  else{const head=Object.keys(rows[0]);const csv=[head.join(";")].concat(rows.map(r=>head.map(h=>'"'+String(r[h]).replace(/"/g,'""')+'"').join(";"))).join("\n");
    const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname.replace(".xlsx",".csv");a.click();}
}
function resetForm(){qty={};horsTarif=[];render();updateTot();}
function showSent(agent,mois){
  $("#ok_title").textContent="Relevé envoyé ✓";
  const{bt,refs}=totals();
  $("#ok_msg").textContent=`${bt} bouteille(s), ${refs} référence(s) transmises. Yasmina recevra le fichier consolidé de tous les agents en fin de mois — rien d'autre à faire.`;
  $("#ok_actions").innerHTML="";addBtn("Nouveau relevé","btn-blue",()=>{resetForm();$("#dlgOK").close();});
  $("#dlgOK").showModal();
}
function showFallback(agent,mois){
  $("#ok_title").textContent="Serveur injoignable";
  $("#ok_msg").textContent="Le relevé n'a pas pu être envoyé (réseau ?). Le fichier a été téléchargé : envoyez-le à Yasmina, ou revalidez plus tard une fois connecté.";
  $("#ok_actions").innerHTML="";
  addBtn("Envoyer à Yasmina (e-mail)","btn-blue",()=>mailTo(agent,mois));
  addBtn("Fermer","btn-ghost",()=>$("#dlgOK").close());
  $("#dlgOK").showModal();
}
function showAutonome(agent,mois,fname){
  $("#ok_title").textContent="Relevé validé";
  const{bt,refs}=totals();
  $("#ok_msg").textContent=`${bt} bouteille(s), ${refs} référence(s) — fichier « ${fname} » téléchargé.`;
  $("#ok_actions").innerHTML="";
  addBtn("Envoyer à Yasmina (e-mail)","btn-blue",()=>mailTo(agent,mois));
  addBtn("Nouveau relevé","btn-ghost",()=>{resetForm();$("#dlgOK").close();});
  $("#dlgOK").showModal();
}
function addBtn(txt,cls,fn){const b=document.createElement("button");b.className="btn "+cls;b.style.width="100%";b.textContent=txt;b.onclick=fn;$("#ok_actions").appendChild(b);}
function mailTo(agent,mois){const{bt,refs}=totals();
  const s=encodeURIComponent(`Échantillons GDD2 – ${agent.nom} – ${mois}`);
  const b=encodeURIComponent(`Bonjour Yasmina,\n\nCi-joint le relevé des échantillons prélevés à GDD2 (${bt} bouteilles, ${refs} références).\nMerci de réclamer les avoirs aux domaines.\n\n(Ne pas oublier de joindre le fichier téléchargé.)\n\n${agent.nom}`);
  location.href=`mailto:${CONFIG.YASMINA_EMAIL}?subject=${s}&body=${b}`;}

render();updateTot();
</script>
</body>
</html>
